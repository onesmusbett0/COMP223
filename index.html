<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africart - Shop conviniently and securely</title> 
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <header>
        <img src="logo.png" alt="logo">
        <h2>Africart</h2>
        <a href="#Home">Home</a>
        <a href="#Products">Products</a>
        <form>
            <input type="text" placeholder="search">
            <img src="search.png" alt="search image">
        </form>
        <img src="cart.png" alt="cart image">
        <button id="signin-btn">sign in</button>

    </header>
    <main>
        <section id="hero-section">
            <h1>
                Discover the latest products
            </h1>
            <p id="hero-p">
                Shop premium items accessories with fast shipping at low prices.
            </p>
            <button id="cta-btn">shop now</button>
            
        </section>
        <div id="main-div">
            <div class="sub-div">
                <i class="fa-solid fa-truck"></i>
                <div>
                    <h6>Free Shipping</h6>
                    <p>Free Shipping on orders over KES 7000</p>
                </div>
            </div>
            <div class="sub-div">
                <i class="fa-solid fa-shield"></i>
                <div>
                    <h6>Secure Payment</h6>
                    <p>100% secure payment processing</p>
                </div>
            </div>
            <div class="sub-div">
                <i class="fa-solid fa-headphones"></i>
                <div>
                    <p>24/7 Support<p>Dedicated customer support team</p></p>
                    
                </div>
            
            </div>
        </div>

    </main>
    <footer>

    </footer>
    
</body>
</html>
